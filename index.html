<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite Especial 💙</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top: #FF6A2B;
    --bg-bottom: #FF3D1A;
    --card-bg: #3A1812;
    --card-bg-2: #4A2117;
    --card-border: rgba(255,255,255,0.10);
    --accent: #FF5A2E;
    --accent-light: #FF8158;
    --accent-deep: #C7401D;
    --text-light: #FFF6EE;
    --text-dim: #FFD8C4;
    --select-glow: 0 0 0 2px #FFFFFF, 0 0 22px rgba(255,255,255,0.35);
    --heart: #2A1410;
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0; padding:0; min-height:100%;
    font-family: 'Quicksand', sans-serif;
    overflow-x: hidden;
  }

  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 28px 16px;
    background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    position: relative;
  }

  /* ---------- floating hearts ---------- */
  #hearts{
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  .heart{
    position: absolute;
    top: -10%;
    color: var(--heart);
    text-shadow: 0 4px 6px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.15);
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4));
    animation-name: fall, sway;
    animation-timing-function: linear, ease-in-out;
    animation-iteration-count: infinite, infinite;
    opacity: 0.9;
    will-change: transform;
  }
  @keyframes fall{
    from{ transform: translateY(-10vh) rotate(0deg); }
    to{ transform: translateY(110vh) rotate(360deg); }
  }
  @keyframes sway{
    0%, 100%{ margin-left: 0px; }
    50%{ margin-left: 28px; }
  }

  /* ---------- main app ---------- */
  .app{
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 420px;
  }

  .hero{
    text-align: center;
    margin-bottom: 18px;
  }
  .hero .emoji{
    font-size: 92px;
    line-height: 1;
    display: inline-block;
    animation: bob 2.6s ease-in-out infinite;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,0.35));
  }
  @keyframes bob{
    0%, 100%{ transform: translateY(0px) rotate(-2deg); }
    50%{ transform: translateY(-10px) rotate(2deg); }
  }

  .card{
    background: linear-gradient(160deg, var(--card-bg) 0%, var(--card-bg-2) 100%);
    border: 1px solid var(--card-border);
    border-radius: 26px;
    padding: 28px 24px 26px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
    color: var(--text-light);
    animation: pop-in 0.45s cubic-bezier(.2,.9,.3,1.3);
  }
  @keyframes pop-in{
    from{ opacity:0; transform: translateY(18px) scale(0.97); }
    to{ opacity:1; transform: translateY(0) scale(1); }
  }

  .card h1{
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 27px;
    letter-spacing: 0.5px;
    text-align: center;
    margin: 0 0 6px;
    text-transform: uppercase;
    text-shadow: 0 2px 0 rgba(0,0,0,0.25);
  }
  .card .subtitle{
    text-align: center;
    font-weight: 600;
    color: var(--text-dim);
    margin: 0 0 22px;
    font-size: 15px;
    line-height: 1.5;
  }

  /* buttons */
  .btn-row{
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn{
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.5px;
    color: var(--text-light);
    background: linear-gradient(180deg, var(--accent-light), var(--accent));
    border: 2px solid rgba(255,255,255,0.55);
    border-radius: 999px;
    padding: 14px 38px;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
    box-shadow: 0 6px 0 var(--accent-deep), 0 10px 18px rgba(0,0,0,0.3);
  }
  .btn:hover{ filter: brightness(1.06); transform: translateY(-2px); }
  .btn:active{ transform: translateY(2px); box-shadow: 0 3px 0 var(--accent-deep); }

  .btn.secondary{
    background: linear-gradient(180deg, #5a3326, #43261c);
    box-shadow: 0 6px 0 #2c1812, 0 10px 18px rgba(0,0,0,0.3);
  }

  .btn.full{
    display:block;
    width: 100%;
    text-align: center;
    margin-top: 22px;
  }
  .btn[disabled]{
    opacity: 0.45;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  .hint{
    text-align:center;
    margin-top: 14px;
    font-size: 13px;
    color: var(--text-dim);
    min-height: 18px;
    font-weight: 600;
  }

  /* form fields */
  .field{ margin-bottom: 16px; }
  .field label{
    display:block;
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 8px;
    color: var(--text-light);
  }
  .field input{
    width: 100%;
    background: #2A130E;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 14px 16px;
    color: var(--text-light);
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 16px;
    outline: none;
    transition: box-shadow .15s ease, border-color .15s ease;
  }
  .field input:focus{
    border-color: var(--accent-light);
    box-shadow: 0 0 0 3px rgba(255,90,46,0.25);
  }
  .field input::-webkit-calendar-picker-indicator{
    filter: invert(1);
    cursor: pointer;
  }

  /* option grid */
  .grid{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 4px;
  }
  .option{
    background: #2A130E;
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 16px;
    padding: 16px 8px;
    text-align: center;
    cursor: pointer;
    transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease, background .12s ease;
    user-select: none;
  }
  .option .ico{
    font-size: 28px;
    display:block;
    margin-bottom: 8px;
  }
  .option .label{
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.3px;
  }
  .option:hover{ transform: translateY(-2px); border-color: rgba(255,255,255,0.25); }
  .option.selected{
    background: linear-gradient(180deg, var(--accent-light), var(--accent));
    box-shadow: var(--select-glow);
    border-color: transparent;
  }

  /* summary */
  .summary{
    background: #2A130E;
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 16px;
    padding: 16px 18px;
    margin-top: 4px;
  }
  .summary .row{
    display:flex;
    align-items:center;
    gap: 10px;
    font-weight: 700;
    font-size: 15px;
    padding: 6px 0;
    color: var(--text-light);
  }
  .summary .row .ic{ font-size: 18px; width: 22px; text-align:center; }

  .progress{
    display:flex;
    gap: 6px;
    justify-content:center;
    margin-bottom: 16px;
  }
  .progress span{
    width: 26px; height: 5px;
    border-radius: 4px;
    background: rgba(255,255,255,0.18);
    transition: background .25s ease;
  }
  .progress span.active{ background: #fff; }

  /* ---------- dedication page ---------- */
  #dedicatoria-screen{
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 16px;
    background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  #dedicatoria-screen.hide{
    opacity: 0;
    pointer-events: none;
    transform: scale(0.96);
  }
  .dedic-card{
    background: linear-gradient(160deg, var(--card-bg) 0%, var(--card-bg-2) 100%);
    border: 1px solid var(--card-border);
    border-radius: 26px;
    padding: 36px 28px 32px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
    color: var(--text-light);
    text-align: center;
    max-width: 420px;
    width: 100%;
    animation: pop-in 0.55s cubic-bezier(.2,.9,.3,1.3);
  }
  .dedic-big-emoji{
    font-size: 86px;
    line-height: 1;
    display: block;
    margin-bottom: 18px;
    animation: bob 2.6s ease-in-out infinite;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,0.35));
  }
  .dedic-card h2{
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 26px;
    margin: 0 0 18px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 0 rgba(0,0,0,0.25);
  }
  .dedic-text{
    font-weight: 600;
    font-size: 15.5px;
    line-height: 1.7;
    color: var(--text-dim);
    margin: 0 0 28px;
  }
  .dedic-text em{
    font-style: normal;
    color: var(--text-light);
    font-weight: 700;
  }
  .dedic-divider{
    width: 48px;
    height: 3px;
    border-radius: 4px;
    background: rgba(255,255,255,0.2);
    margin: 0 auto 24px;
  }

  @media (max-width: 380px){
    .card{ padding: 22px 16px; }
    .card h1{ font-size: 23px; }
    .hero .emoji{ font-size: 76px; }
    .grid{ gap: 8px; }
    .option{ padding: 12px 4px; }
    .btn{ padding: 13px 28px; font-size: 16px; }
  }
</style>
</head>
<body>

<div id="dedicatoria-screen">
  <div class="dedic-card">
    <span class="dedic-big-emoji">💌</span>
    <h2>Para você, amor</h2>
    <div class="dedic-divider"></div>
    <p class="dedic-text">
      Antes de mais nada, só queria que soubesse que você é a pessoa mais especial que eu tenho.<br><br>
      Cada momento ao seu lado vira uma memória que eu guardo com muito carinho.<br><br>
      Criei isso com todo o amor do mundo, porque <em>você merece</em>. 🖤
      <br><br>
      Ass: Amor da sua vida.
      Para: Karol 🖤
    </p>
    <button class="btn" id="dedicBtn">Abrir o convite 💙</button>
  </div>
</div>

<div id="hearts"></div>

<div class="app">
  <div class="progress" id="progress"></div>
  <div class="hero">
    <span class="emoji" id="emoji">🥺</span>
  </div>
  <div class="card" id="card"></div>
</div>

<script>
/* ============ CONFIG — edite aqui se quiser personalizar ============ */
const PESSOA = "Gatinha"; // como o convite vai chamar a pessoa no final
/* ====================================================================== */

const state = {
  step: 0,
  date: "",
  time: "18:00",
  food: null,
  vibe: null,
  naoCount: 0
};

const FOOD_OPTIONS = [
  { id: "burger", icon: "🍔", label: "Hambúrguer" },
  { id: "sushi",  icon: "🍣", label: "Sushi" },
  { id: "massas", icon: "🍝", label: "Massas" },
  { id: "cachorroquente",  icon: "🌭", label: "Cachorro Quente" },
  { id: "pizza",  icon: "🍕", label: "Pizza" },
];

const VIBE_OPTIONS = [
  { id: "piquenique",     icon: "⛳", label: "Piquenique" },
  { id: "caminhada", icon: "🚶", label: "Caminhada" },
  { id: "cinema",    icon: "🎬", label: "Cinema" },
  { id: "justdance",     icon: "💃", label: "Just Dance" },
  { id: "parque",    icon: "🎢", label: "Parque" },
  { id: "conxinha",     icon: "🛏️", label: "Conxinha" },
];

const NAO_MESSAGES = [
  "Tem certeza? 🥺",
  "Pensa bem antes de clicar de novo... 👀",
  "É a última chance, sabia? 😳",
  "Ok ok, vou fingir que esse botão não existe 😏"
];

const TOTAL_STEPS = 6;

function setEmoji(e){
  document.getElementById('emoji').textContent = e;
}

function renderProgress(){
  const wrap = document.getElementById('progress');
  wrap.innerHTML = '';
  for(let i=0;i<TOTAL_STEPS;i++){
    const dot = document.createElement('span');
    if(i <= state.step) dot.classList.add('active');
    wrap.appendChild(dot);
  }
}

function goTo(step){
  state.step = step;
  render();
}

function render(){
  renderProgress();
  const card = document.getElementById('card');

  switch(state.step){

    /* ---------------- STEP 0 ---------------- */
    case 0: {
      setEmoji('🥺');
      card.innerHTML = `
        <h1>Você aceitaria ir a um date comigo?</h1>
        <p class="subtitle">Pensa com carinho antes de responder 💭</p>
        <div class="btn-row">
          <button class="btn" id="simBtn">SIM</button>
          <button class="btn secondary" id="naoBtn">NÃO</button>
        </div>
        <div class="hint" id="hint"></div>
      `;
      document.getElementById('simBtn').onclick = () => goTo(1);
      document.getElementById('naoBtn').onclick = () => {
        const hint = document.getElementById('hint');
        const msg = NAO_MESSAGES[Math.min(state.naoCount, NAO_MESSAGES.length - 1)];
        hint.textContent = msg;
        state.naoCount++;
        const btn = document.getElementById('naoBtn');
        btn.style.transform = 'scale(' + Math.max(0.55, 1 - state.naoCount*0.12) + ')';
        setEmoji(['🥺','😢','🙏','🐱'][Math.min(state.naoCount,3)]);
      };
      break;
    }

    /* ---------------- STEP 1 ---------------- */
    case 1: {
      setEmoji('😏🌹');
      card.innerHTML = `
        <h1>Você disse sim? 😳</h1>
        <p class="subtitle">Eu estava esperando você dizer não kkkk</p>
        <button class="btn full" id="next1">PRÓXIMO 💙</button>
      `;
      document.getElementById('next1').onclick = () => goTo(2);
      break;
    }

    /* ---------------- STEP 2 ---------------- */
    case 2: {
      setEmoji('📅');
      card.innerHTML = `
        <h1>Quando você tá livre? 🗓️</h1>
        <p class="subtitle">Escolhe a data e o horário que ficar melhor pra você</p>
        <div class="field">
          <label for="dateInput">Escolhe a data</label>
          <input type="date" id="dateInput" value="${state.date}">
        </div>
        <div class="field">
          <label for="timeInput">Escolhe o horário</label>
          <input type="time" id="timeInput" value="${state.time}">
        </div>
        <button class="btn full" id="next2">SELECIONAR A DATA 💙</button>
      `;
      const dateInput = document.getElementById('dateInput');
      const timeInput = document.getElementById('timeInput');
      dateInput.oninput = (e) => state.date = e.target.value;
      timeInput.oninput = (e) => state.time = e.target.value;
      document.getElementById('next2').onclick = () => {
        if(!dateInput.value){
          dateInput.style.boxShadow = '0 0 0 3px rgba(255,90,46,0.5)';
          dateInput.focus();
          return;
        }
        state.date = dateInput.value;
        state.time = timeInput.value || '18:00';
        goTo(3);
      };
      break;
    }

    /* ---------------- STEP 3 ---------------- */
    case 3: {
      setEmoji('🤔');
      card.innerHTML = `
        <h1>O que tá afim? 🤤</h1>
        <p class="subtitle">Escolhe o que vamos comer</p>
        <div class="grid" id="foodGrid">
          ${FOOD_OPTIONS.map(o => `
            <div class="option ${state.food===o.id?'selected':''}" data-id="${o.id}">
              <span class="ico">${o.icon}</span>
              <span class="label">${o.label}</span>
            </div>
          `).join('')}
        </div>
        <button class="btn full" id="next3" ${state.food ? '' : 'disabled'}>BORA! 💙</button>
      `;
      document.querySelectorAll('#foodGrid .option').forEach(el => {
        el.onclick = () => {
          state.food = el.dataset.id;
          render();
        };
      });
      const nextBtn = document.getElementById('next3');
      nextBtn.onclick = () => { if(state.food) goTo(4); };
      break;
    }

    /* ---------------- STEP 4 ---------------- */
    case 4: {
      setEmoji('🌟');
      card.innerHTML = `
        <h1>Qual é a vibe? 🌟</h1>
        <p class="subtitle">Escolhe a atividade ideal</p>
        <div class="grid" id="vibeGrid">
          ${VIBE_OPTIONS.map(o => `
            <div class="option ${state.vibe===o.id?'selected':''}" data-id="${o.id}">
              <span class="ico">${o.icon}</span>
              <span class="label">${o.label}</span>
            </div>
          `).join('')}
        </div>
        <button class="btn full" id="next4" ${state.vibe ? '' : 'disabled'}>ISSO PARECE LEGAL! 😎</button>
      `;
      document.querySelectorAll('#vibeGrid .option').forEach(el => {
        el.onclick = () => {
          state.vibe = el.dataset.id;
          render();
        };
      });
      const nextBtn = document.getElementById('next4');
      nextBtn.onclick = () => { if(state.vibe) goTo(5); };
      break;
    }

    /* ---------------- STEP 5 (final) ---------------- */
    case 5: {
      setEmoji('🐧🌹');
      const food = FOOD_OPTIONS.find(f => f.id === state.food);
      const vibe = VIBE_OPTIONS.find(v => v.id === state.vibe);
      const dateStr = formatDate(state.date);
      card.innerHTML = `
        <h1>Tô contigo, ${PESSOA.toLowerCase()}. 💙</h1>
        <p class="subtitle">Fica pronta que eu vou te buscar 🚗</p>
        <div class="summary">
          <div class="row"><span class="ic">📅</span> ${dateStr}</div>
          <div class="row"><span class="ic">⏰</span> ${state.time}</div>
          <div class="row"><span class="ic">${food ? food.icon : '🍽️'}</span> ${food ? food.label : '—'}</div>
          <div class="row"><span class="ic">${vibe ? vibe.icon : '✨'}</span> ${vibe ? vibe.label : '—'}</div>
        </div>
        <button class="btn full" id="restartBtn">RECOMEÇAR 🔁</button>
      `;
      document.getElementById('restartBtn').onclick = () => {
        state.step = 0;
        state.food = null;
        state.vibe = null;
        state.naoCount = 0;
        render();
      };
      break;
    }
  }
}

function formatDate(value){
  if(!value) return '—';
  const [y,m,d] = value.split('-');
  const meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  return `${parseInt(d)} de ${meses[parseInt(m)-1]} de ${y}`;
}

/* ============ floating hearts background ============ */
function makeHearts(count){
  const wrap = document.getElementById('hearts');
  for(let i=0;i<count;i++){
    const h = document.createElement('span');
    h.className = 'heart';
    h.textContent = '🖤';
    const size = 18 + Math.random()*30;
    h.style.fontSize = size + 'px';
    h.style.left = (Math.random()*100) + 'vw';
    const fallDur = 8 + Math.random()*10;
    const swayDur = 3 + Math.random()*3;
    h.style.animationDuration = `${fallDur}s, ${swayDur}s`;
    h.style.animationDelay = `${-Math.random()*fallDur}s, ${-Math.random()*swayDur}s`;
    wrap.appendChild(h);
  }
}

makeHearts(22);
render();

/* ============ dedicatória ============ */
document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('dedicBtn');
  if(btn){
    btn.addEventListener('click', () => {
      const screen = document.getElementById('dedicatoria-screen');
      screen.classList.add('hide');
      setTimeout(() => screen.remove(), 650);
    });
  }
});
</script>
</body>
</html>
